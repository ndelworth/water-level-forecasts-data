name: get-chs-data

on:
  schedule:
    - cron: "12 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: get-chs-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - name: Poll wlf snapshot
        run: uv run python poll_wlf_snapshot.py
      - name: Commit snapshot data
        run: |
          git config user.name "wlf-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/*.csv
          git diff --cached --quiet && echo "nothing to commit" || git commit -m "data: hourly update $(date -u +%FT%H:%MZ)"
          git pull --rebase origin main
          git push
